name: ShopMate Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Check out the code
      - uses: actions/checkout@v4

      # Step 2 — Set up Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      # Step 3 — Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4 — Install Playwright browsers
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Step 5 — Create the .auth directory
      # Without this, the setup step has nowhere to save the session file
      - name: Create auth directory
        run: mkdir -p .auth

      # Step 6 — Run auth setup first to generate the session file
      - name: Run auth setup
        run: npx playwright test tests/auth.setup.ts
        env:
          CI: true

      # Step 7 — Run all tests using the saved session
      - name: Run all Playwright tests
        run: npx playwright test --ignore tests/auth.setup.ts
        env:
          CI: true

      # Step 8 — Upload test report so you can view results in GitHub
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30